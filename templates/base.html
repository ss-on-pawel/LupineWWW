<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Zarzadzanie majatkiem{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            color: #222;
        }
        header, main {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        a {
            color: #0a5db1;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .messages {
            list-style: none;
            padding: 0;
        }
        .messages li {
            background: #eaf5ea;
            border: 1px solid #b7d8b7;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }
        form p {
            margin-bottom: 16px;
        }
        input, textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-top: 6px;
        }
        button {
            padding: 10px 16px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <header>
        <h1>Zarzadzanie majatkiem</h1>
        <nav>
            <a href="{% url 'assets:list' %}">Lista srodkow</a>
            |
            <a href="{% url 'assets:create' %}">Dodaj srodek</a>
            |
            <a href="/admin/">Admin</a>
        </nav>
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
